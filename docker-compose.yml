version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: arrk_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/arrk_ai
      CORS_ORIGINS: http://localhost:5173
      AUTO_INIT_DB: 'true'
    depends_on:
      - db
    ports:
      - '8000:8000'
    volumes:
      - ./backend/data:/app/backend/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_BASE: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  postgres_data:
